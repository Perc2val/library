<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <button class="createNewBookDialog">New Book</button>
    </header>
    <div class="bookList">
        <div class="shell">
                <h3>Title: Percy</h3>
                <p>Author: Rick</p>
                <p>Pages: 200</p>
                <p>Read: yes</p>
        </div>
    </div>
    <dialog class="dialog">
        <form class="formReset">
            <label for="title">
                Title:
            <input type="text" name="title" id="title">
            </label>
            <label for="author">
                Author:
            <input type="text" name="author" id="author">
            </label>
            <label for="pages">
                Pages:
            <input type="number" name="pages" id="pages">
            </label>
            <label for="read">
                Read:
            <input type="checkbox" name="read" id="read">
            </label>
            <button class="createNewBook" type="button">Save</button>
            <button class="cancelNewBook" type="button"">Cancel</button>
        </form>
    </dialog>
    <script src="javascript.js"></script>
</body>
</html>
